# Supabase & Frontend (Dokploy-Compatible version)
# This version uses different ports to avoid clashing with your existing Dokploy setup

services:
  db:
    container_name: supabase-db
    image: supabase/postgres:15.1.1.78
    healthcheck:
      test: pg_isready -U postgres -d postgres
      interval: 5s
    environment:
      POSTGRES_PASSWORD: password123
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
      - ./db_schema:/docker-entrypoint-initdb.d
    ports:
      - 5433:5432  # Changed to 5433 because Dokploy is using 5432
    restart: unless-stopped

  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.158.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_EXTERNAL_DB_URL: postgres://postgres:password123@db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: http://187.77.25.203:8080
      GOTRUE_JWT_SECRET: f7e6d5c4b3a291807f6e5d4c3b2a1908f7e6d5c4b3a291807f6e5d4c3b2a1908
    restart: unless-stopped

  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.2.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:password123@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: f7e6d5c4b3a291807f6e5d4c3b2a1908f7e6d5c4b3a291807f6e5d4c3b2a1908
    restart: unless-stopped

  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    ports:
      - 8010:8000
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
    restart: unless-stopped

  frontend:
    container_name: cricket-frontend
    image: nginx:alpine
    ports:
      - 8080:80
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
